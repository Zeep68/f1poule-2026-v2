<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stand — F1 Poule 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e8002d;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --dark: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(232,0,45,0.25);
      --text: #f0f0f0;
      --muted: #555570;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,0,45,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,0,45,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 40px 0 28px;
    }

    .header-badge {
      display: inline-block;
      background: var(--red);
      color: white;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(26px, 7vw, 38px);
      font-weight: 900;
      letter-spacing: -1px;
    }

    .header h1 span { color: var(--red); }

    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--red);
      color: white;
    }

    /* Leaderboard */
    .leaderboard { display: flex; flex-direction: column; gap: 6px; }

    .entry {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .entry:hover { border-color: rgba(232,0,45,0.5); transform: translateX(2px); }
    .entry.p1 { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.05); }
    .entry.p2 { border-color: rgba(192,192,192,0.3); }
    .entry.p3 { border-color: rgba(205,127,50,0.3); }

    .pos-badge {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 900;
    }

    .pos-badge.p1 { background: rgba(255,215,0,0.2); color: var(--gold); }
    .pos-badge.p2 { background: rgba(192,192,192,0.15); color: var(--silver); }
    .pos-badge.p3 { background: rgba(205,127,50,0.15); color: var(--bronze); }
    .pos-badge.other { background: rgba(255,255,255,0.05); color: var(--muted); }

    .entry-name {
      font-size: 17px;
      font-weight: 600;
    }

    .entry-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .entry-points {
      text-align: right;
    }

    .points-big {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
    }

    .points-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* Race history tab */
    .races-list { display: flex; flex-direction: column; gap: 16px; }

    .race-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .race-card-header {
      padding: 14px 16px;
      background: rgba(232,0,45,0.08);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .race-card-name {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
    }

    .race-card-date {
      font-size: 12px;
      color: var(--muted);
    }

    .race-results {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .race-result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 14px;
    }

    .race-result-row:last-child { border-bottom: none; }

    .race-pos { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--muted); width: 28px; }
    .race-naam { flex: 1; font-weight: 600; }
    .race-pts { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--red); }

    .uitslag-block {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    .uitslag-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .uitslag-drivers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .uitslag-driver-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
    }

    .chip-pos { font-family: 'Orbitron', monospace; font-size: 10px; color: var(--muted); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-text { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 2px; }

    /* Nav */
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .nav-back:hover { color: var(--text); }

    #loading {
      text-align: center;
      padding: 80px 0;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--surface2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 20px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .refresh-btn:hover { border-color: var(--red); color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-badge">🏆 F1 POULE 2026</div>
      <h1>SEIZOEN<br><span>STAND</span></h1>
    </div>

    <a href="/" class="nav-back">← Voorspelling invoeren</a>

    <div class="tab-bar">
      <div class="tab active" onclick="showTab('stand')">STAND</div>
      <div class="tab" onclick="showTab('races')">RACES</div>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      LADEN...
    </div>

    <div id="app" style="display:none">
      <button class="refresh-btn" onclick="loadData()">↻ VERNIEUWEN</button>
      <div id="tab-stand"></div>
      <div id="tab-races" style="display:none"></div>
    </div>
  </div>

  <script>
    let standData = null;
    let activeTab = 'stand';

    async function loadData() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('app').style.display = 'none';

      try {
        const res = await fetch('/.netlify/functions/get-stand');
        standData = await res.json();
        renderAll();
      } catch(e) {
        document.getElementById('loading').innerHTML = '<p style="color:#e8002d">Kon stand niet laden.</p>';
      }
    }

    function showTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'stand') || (i === 1 && tab === 'races'));
      });
      document.getElementById('tab-stand').style.display = tab === 'stand' ? 'block' : 'none';
      document.getElementById('tab-races').style.display = tab === 'races' ? 'block' : 'none';
    }

    function renderAll() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderStand();
      renderRaces();
    }

    function renderStand() {
      const el = document.getElementById('tab-stand');
      const deelnemers = standData?.deelnemers || [];

      if (!deelnemers.length) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">🏁</div><div class="empty-text">NOG GEEN STAND</div></div>`;
        return;
      }

      el.innerHTML = `<div class="leaderboard">${deelnemers.map((d, i) => `
        <div class="entry ${i < 3 ? 'p'+(i+1) : ''}">
          <div class="pos-badge ${i < 3 ? 'p'+(i+1) : 'other'}">${i+1}</div>
          <div>
            <div class="entry-name">${d.naam}</div>
            <div class="entry-meta">${d.races} race${d.races !== 1 ? 's' : ''} · gem. ${d.races > 0 ? (d.totaal/d.races).toFixed(1) : 0} pt</div>
          </div>
          <div class="entry-points">
            <div class="points-big">${d.totaal}</div>
            <div class="points-label">PUNTEN</div>
          </div>
        </div>`).join('')}
      </div>`;
    }

    function renderRaces() {
      const el = document.getElementById('tab-races');
      const races = standData?.races || [];

      if (!races.length) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">NOG GEEN RACES GESPEELD</div></div>`;
        return;
      }

      el.innerHTML = `<div class="races-list">${races.map(race => `
        <div class="race-card">
          <div class="race-card-header">
            <div class="race-card-name">🏁 ${race.naam}</div>
            <div class="race-card-date">${race.datum}</div>
          </div>
          <div class="race-results">
            ${race.resultaten.sort((a,b) => b.punten - a.punten).map((r,i) => `
              <div class="race-result-row">
                <div class="race-pos">P${i+1}</div>
                <div class="race-naam">${r.naam}</div>
                <div class="race-pts">+${r.punten}pt</div>
              </div>`).join('')}
          </div>
          ${race.uitslag ? `
          <div class="uitslag-block">
            <div class="uitslag-label">Officiële uitslag</div>
            <div class="uitslag-drivers">
              ${race.uitslag.map((d, i) => `
                <div class="uitslag-driver-chip">
                  <span class="chip-pos">P${i+1}</span>
                  <span>${d}</span>
                </div>`).join('')}
            </div>
          </div>` : ''}
        </div>`).join('')}
      </div>`;
    }

    loadData();
  </script>
</body>
</html>
