[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduled function: elke maandag om 12:00 UTC automatisch uitslag ophalen
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions."sync-results"]
  schedule = "0 12 * * 1"

# Redirect rules
[[redirects]]
  from = "/voorspel"
  to = "/"
  status = 301

[[redirects]]
  from = "/klassement"
  to = "/stand.html"
  status = 301
